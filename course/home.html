<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كورس البرمجة | Nemo</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .lesson-card { transition: all 0.3s ease; }
        .lesson-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .locked-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; border-radius: 0.5rem; z-index: 5; }
        .tab-btn { transition: all 0.3s ease; }
        .active-tab { background-color: #e53e3e; color: white; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .iframe-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; }
        .iframe-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .preview-icon { display: flex; align-items: center; justify-content: center; height: 160px; background-color: #f3f4f6; color: #4b5563; font-size: 3rem; }
        .disabled-btn { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <header class="bg-gray-900 text-white py-4 shadow-lg">
        <div class="container mx-auto px-4">
            <div class="text-xl font-bold">Nemo | كورس البرمجة <span class="text-sm bg-purple-600 rounded-md px-2 py-0.5 mr-2 align-middle">Programming</span></div>
        </div>
    </header>
    <nav class="bg-white shadow-sm sticky top-0 z-10">
        <div class="container mx-auto px-4 overflow-x-auto no-scrollbar">
            <div class="flex space-x-1 space-x-reverse py-3">
                <button data-tab="lessons" class="tab-btn active-tab px-6 py-2 rounded-lg font-medium"><i class="fas fa-video mr-2"></i> الشروحات</button>
                <button data-tab="exercises" class="tab-btn px-6 py-2 rounded-lg font-medium"><i class="fas fa-pen-fancy mr-2"></i> التدريبات</button>
                <button data-tab="exams" class="tab-btn px-6 py-2 rounded-lg font-medium"><i class="fas fa-clipboard-list mr-2"></i> الامتحانات</button>
                <button data-tab="files" class="tab-btn px-6 py-2 rounded-lg font-medium"><i class="fas fa-file-pdf mr-2"></i> الملفات</button>
            </div>
        </div>
    </nav>
    <main class="flex-grow container mx-auto px-4 py-6">
        <div id="paymentAlert" class="bg-yellow-100 border-l-4 border-yellow-500 text-yellow-700 p-4 mb-6 rounded-lg flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div><i class="fas fa-lock text-xl mr-3 mt-1"></i><div><p class="font-bold">🔒 هذا المحتوى مقفل</p><p>أدخل كود التفعيل الصحيح لفتح جميع محتويات كورس البرمجة.</p></div></div>
            <div class="flex gap-2 w-full md:w-auto">
                <input type="text" id="activationCodeInput" placeholder="مثال: ABC1-D2E3-FG45" class="px-3 py-2 border border-yellow-400 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-yellow-500 text-black flex-grow" disabled>
                <button id="submitCodeBtn" class="bg-yellow-600 hover:bg-yellow-700 text-white px-4 py-2 rounded-lg font-bold whitespace-nowrap transition-colors disabled:opacity-50" disabled>تفعيل</button>
            </div>
        </div>
        <section class="tab-content">
            <h2 id="sectionTitle" class="text-xl font-bold mb-4 text-gray-800 border-b pb-2"><i class="fas fa-video mr-2 text-red-600"></i> محاضرات كورس البرمجة</h2>
            <div id="contentGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">⏳ جاري التحميل...</div>
        </section>
    </main>
    <div id="payButtonContainer" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-20">
        <button id="payButton" class="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-8 rounded-full shadow-lg flex items-center"><i class="fab fa-whatsapp text-xl mr-2"></i> شراء كود التفعيل عبر واتساب (كورس البرمجة)</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQ8LFihzOPueW0_FCgRF6uEiAMgn24sF8",
            authDomain: "nemo-8d0c7.firebaseapp.com",
            projectId: "nemo-8d0c7",
            storageBucket: "nemo-8d0c7.firebasestorage.app",
            messagingSenderId: "585101385202",
            appId: "1:585101385202:web:fb703a536893fb4aaadf6b"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ✅ كورس البرمجة
        const CURRENT_SUBJECT = "programming";
        let currentGrade = "course";   // يمكنك تغييرها حسب ما وضعته في قاعدة البيانات (مثلاً "programming" أو "prep1")
        let currentTab = "lesson";
        let isActivated = false;

        // عناصر DOM
        const tabBtns = document.querySelectorAll('.tab-btn');
        const contentGrid = document.getElementById('contentGrid');
        const sectionTitle = document.getElementById('sectionTitle');
        const payButton = document.getElementById('payButton');
        const paymentAlert = document.getElementById('paymentAlert');
        const activationCodeInput = document.getElementById('activationCodeInput');
        const submitCodeBtn = document.getElementById('submitCodeBtn');
        const payButtonContainer = document.getElementById('payButtonContainer');

        const tabMeta = {
            lessons: { type: "lesson", title: "محاضرات كورس البرمجة", icon: "fa-video", color: "text-red-600", btnText: "تشغيل الفيديو", btnIcon: "fa-play-circle" },
            exercises: { type: "exercise", title: "التدريبات البرمجية", icon: "fa-pen-fancy", color: "text-blue-600", btnText: "تحميل التدريب", btnIcon: "fa-download" },
            exams: { type: "exam", title: "اختبارات التقييم", icon: "fa-clipboard-list", color: "text-green-600", btnText: "بدء الاختبار", btnIcon: "fa-play" },
            files: { type: "file", title: "الملخصات والمذكرات", icon: "fa-file-pdf", color: "text-purple-600", btnText: "تحميل المذكرة", btnIcon: "fa-download" }
        };

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const target = btn.getAttribute('data-tab');
                tabBtns.forEach(b => b.classList.remove('active-tab'));
                btn.classList.add('active-tab');
                const meta = tabMeta[target];
                currentTab = meta.type;
                sectionTitle.innerHTML = `<i class="fas ${meta.icon} mr-2 ${meta.color}"></i> ${meta.title}`;
                loadSubjectContent();
            });
        });

        function formatVideoUrl(url) {
            if (!url) return '';
            if (url.includes('youtube.com/watch?v=')) return url.replace('watch?v=', 'embed/');
            if (url.includes('youtu.be/')) {
                const id = url.split('youtu.be/')[1].split('?')[0];
                return `https://www.youtube.com/embed/${id}`;
            }
            return url;
        }

        async function loadSubjectContent() {
            contentGrid.innerHTML = '<p class="text-gray-500 col-span-full text-center py-10">⏳ جاري تحميل محتوى كورس البرمجة...</p>';
            try {
                const snapshot = await db.collection('content')
                    .where('grade', '==', currentGrade)
                    .where('subject', '==', CURRENT_SUBJECT)
                    .where('contentType', '==', currentTab)
                    .get();
                if (snapshot.empty) {
                    contentGrid.innerHTML = '<p class="text-gray-500 col-span-full text-center py-10">📁 لا يوجد محتوى متوفر حالياً في هذا القسم.</p>';
                    return;
                }
                contentGrid.innerHTML = '';
                const activeKey = Object.keys(tabMeta).find(k => tabMeta[k].type === currentTab);
                const meta = tabMeta[activeKey];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const card = document.createElement('div');
                    card.className = "lesson-card bg-white rounded-lg shadow-md overflow-hidden relative";
                    let mediaArea = '';
                    if (currentTab === 'lesson' && isActivated) {
                        mediaArea = `<div class="iframe-container"><iframe src="${formatVideoUrl(data.mediaUrl)}" frameborder="0" allowfullscreen></iframe></div>`;
                    } else {
                        let icon = currentTab === 'lesson' ? 'fa-video' : (currentTab === 'exercise' ? 'fa-pen-ruler' : (currentTab === 'exam' ? 'fa-file-alt' : 'fa-file-pdf'));
                        mediaArea = `<div class="preview-icon relative"><i class="fas ${icon} fa-4x"></i>${!isActivated ? '<div class="locked-overlay"><i class="fas fa-lock text-3xl mb-2"></i><span>محتوى مقفل</span></div>' : ''}</div>`;
                    }
                    const actionDisabled = !isActivated ? 'disabled' : '';
                    card.innerHTML = `
                        ${mediaArea}
                        <div class="p-4">
                            <h3 class="font-bold text-lg mb-1">${data.title || 'بدون عنوان'}</h3>
                            <p class="text-gray-600 text-sm mb-2"><i class="far fa-clock"></i> متاح فور التفعيل</p>
                            <div class="flex justify-between">
                                <span class="text-sm text-gray-500"><i class="fas ${meta.icon}"></i> كورس البرمجة</span>
                                <button onclick="handleAction('${data.mediaUrl || ''}')" class="${meta.color} text-sm font-medium action-btn" ${actionDisabled}><i class="fas ${meta.btnIcon}"></i> ${meta.btnText}</button>
                            </div>
                        </div>
                    `;
                    contentGrid.appendChild(card);
                });
            } catch (err) {
                console.error(err);
                contentGrid.innerHTML = '<p class="text-red-500 text-center">❌ خطأ في التحميل</p>';
            }
        }

        window.handleAction = (url) => { if (isActivated && url) window.open(url, '_blank'); else if(!isActivated) alert("🔐 فعّل حسابك أولاً"); };

        function unlockUI() { isActivated = true; paymentAlert.classList.add('hidden'); payButtonContainer.classList.add('hidden'); loadSubjectContent(); }
        function lockUI() { isActivated = false; paymentAlert.classList.remove('hidden'); payButtonContainer.classList.remove('hidden'); loadSubjectContent(); }
        function setControls(enabled) { activationCodeInput.disabled = !enabled; submitCodeBtn.disabled = !enabled; }

        async function checkUserActivation(uid) {
            try {
                const userRef = db.collection('users').doc(uid);
                const snap = await userRef.get();
                if (snap.exists && snap.data().isActivated === true) {
                    isActivated = true;
                    unlockUI();
                } else {
                    if (!snap.exists) await userRef.set({ grade: currentGrade, isActivated: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    isActivated = false;
                    lockUI();
                }
            } catch(e) { console.error(e); lockUI(); }
            setControls(true);
        }

        submitCodeBtn.addEventListener('click', async () => {
            const enteredCode = activationCodeInput.value.trim().toUpperCase();
            if (!enteredCode) return alert("📝 أدخل كود التفعيل الخاص بكورس البرمجة");
            if (!auth.currentUser) return alert("يرجى تسجيل الدخول أولاً");

            try {
                const codesRef = db.collection('activation_codes');
                const q = codesRef.where('code', '==', enteredCode).where('used', '==', false).limit(1);
                const querySnap = await q.get();
                if (querySnap.empty) return alert("❌ كود غير صحيح أو تم استخدامه من قبل");
                const codeDoc = querySnap.docs[0];
                await codeDoc.ref.update({
                    used: true,
                    usedBy: auth.currentUser.email || auth.currentUser.uid,
                    usedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                await db.collection('users').doc(auth.currentUser.uid).set({ isActivated: true, grade: currentGrade }, { merge: true });
                isActivated = true;
                unlockUI();
                alert("✅ تم تفعيل كورس البرمجة بنجاح!");
                activationCodeInput.value = '';
            } catch (err) {
                console.error(err);
                alert("⚠️ حدث خطأ أثناء التفعيل، حاول مرة أخرى");
            }
        });

        payButton.addEventListener('click', () => {
            let email = auth.currentUser?.email;
            if (!email) email = prompt("📧 بريدك الإلكتروني لإرساله للمدرس:");
            if (email) window.open(`https://wa.me/201211493385?text=${encodeURIComponent(`اريد شراء كود تفعيل - كورس البرمجة\nالايميل: ${email}`)}`, '_blank');
        });

        auth.onAuthStateChanged(async (user) => {
            if (!user) { alert("يرجى تسجيل الدخول أولاً"); window.location.href = "../index.html"; return; }
            await checkUserActivation(user.uid);
        });
    </script>
</body>
</html>
